services:
  db:
    image: postgres:15-alpine
    container_name: postgres-spring-rest
    environment:
      - POSTGRES_DB=practica_db
      - POSTGRES_USER=usuario_api
      - POSTGRES_PASSWORD=password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: