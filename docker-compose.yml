services:
  db:
    image: postgres:15-alpine
    container_name: postgres-spring-rest
    environment:
      - POSTGRES_DB=practica_db
      - POSTGRES_USER=usuario_api
      - POSTGRES_PASSWORD=password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  app:
    build: .
    container_name: spring-boot-app
    depends_on:
      - db
      - kafka
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/practica_db
      - SPRING_DATASOURCE_USERNAME=usuario_api
      - SPRING_DATASOURCE_PASSWORD=password123
      - SPRING_JPA_HIBERNATE_DDL_AUTO=validate
      - SPRING_FLYWAY_ENABLED=true
    ports:
      - "8080:8080"
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  contract-test-runner:
    image: springcloud/spring-cloud-contract:4.2.2
    container_name: contract-test-runner
    ports:
      - "8083:8083"
    volumes:
      - ./src/test/resources/contracts:/contracts:ro
      - contract-test-reports:/reports
    environment:
      - STUBRUNNER_IDS=related-accounts-service
      - STUBRUNNER_REPOSITORY_ROOT=file:/contracts/
      - SERVER_PORT=8083
      - SPRING_CLOUD_CONTRACT_VERIFIER_HTTP_BASEURL=http://spring-boot-app:8080
      - APPLICATION_BASE_URL=http://spring-boot-app:8080
      - PUBLISH_ARTIFACTS=false
    depends_on:
      app:
        condition: service_healthy
      db:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/8083' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  postgres_data:
  contract-test-reports: